# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  build:
    desc: Build the binary
    cmds:
      - go build -o bin/brew-potato ./main.go

  test:
    desc: Run all tests
    cmds:
      - go test -race ./...

  run:
    desc: Run the application
    cmds:
      - go run ./main.go

  deploy:
    desc: "Tag and push a release (usage: task deploy VERSION=v1.2.3)"
    cmds:
      - git tag {{.VERSION}}
      - git push origin {{.VERSION}}
    requires:
      vars: [VERSION]
